version: 2
sources:
  - name: ecommerce
    database: raw_db
    schema: public
    tables:
      - name: orders
        config:
          loaded_at_field: updated_at
        columns:
          - name: order_id
            tests: 
              - unique
              - not_null
          - name: customer_id
            tests: 
              - not_null
          - name: order_date
            tests: 
              - not_null
          - name: order_status
            tests: 
              - not_null
          - name: total_amount
            tests: 
              - not_null
          - name: shipping_address
          - name: created_at
            tests: 
              - not_null
          - name: updated_at
            tests: 
              - not_null
      - name: order_items
        config:
          loaded_at_field: updated_at
        columns:
          - name: order_item_id
            tests:
              - unique
              - not_null
          - name: order_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: quantity
            tests:
              - not_null
          - name: unit_price
            tests:
              - not_null
          - name: total_price
            tests:
              - not_null
          - name: created_at
            tests: 
              - not_null
          - name: updated_at
            tests: 
              - not_null
      - name: customers
        config:
          loaded_at_field: updated_at
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null
          - name: first_name
            tests:
              - not_null
          - name: last_name
            tests:
              - not_null
          - name: email
            tests:
              - not_null
          - name: phone
          - name: city
          - name: state
          - name: country
          - name: created_at
            tests: 
              - not_null
          - name: updated_at
            tests: 
              - not_null
      - name: products
        config:
          loaded_at_field: updated_at
        columns:
          - name: product_id
            tests:
              - unique
              - not_null
          - name: product_name
            tests:
              - not_null
          - name: description
          - name: category
          - name: brand
          - name: unit_price
            tests:
              - not_null
          - name: stock_quantity
            tests:
              - not_null
          - name: shelf_life_days
          - name: created_at
            tests: 
              - not_null
          - name: updated_at
            tests: 
              - not_null